name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"
      - "jest.config.js"
      - "jest.setup.js"
      - "babel.config.js"
      - "eslint.config.mjs"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"
      - "jest.config.js"
      - "jest.setup.js"
      - "babel.config.js"
      - "eslint.config.mjs"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────
# Jobs
# ──────────────────────────────────────
jobs:
  # ── 1. Lint ─────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Unit & Integration Tests ─────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit & integration tests
        run: npx jest --verbose --coverage --ci

      # Node 22 のみカバレッジをアップロード
      - name: Upload coverage artifact
        if: always() && matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 3. Build ────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

  # ── 4. PR カバレッジコメント ─────────
  coverage-comment:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Comment PR with coverage
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## 📊 Test Coverage Report\n\n';

            try {
              const summary = JSON.parse(
                fs.readFileSync('./coverage/coverage-summary.json', 'utf8')
              );
              const t = summary.total;

              comment += '| Metric     | Coverage |\n';
              comment += '|------------|----------|\n';
              comment += `| Lines      | ${t.lines.pct.toFixed(2)}% |\n`;
              comment += `| Statements | ${t.statements.pct.toFixed(2)}% |\n`;
              comment += `| Branches   | ${t.branches.pct.toFixed(2)}% |\n`;
              comment += `| Functions  | ${t.functions.pct.toFixed(2)}% |\n`;
            } catch (e) {
              comment += '⚠️ カバレッジレポートの読み込みに失敗しました。\n';
            }

            comment += '\n_Generated by Frontend CI_';

            // 既存コメントがあれば更新、なければ新規作成
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c =>
              c.body?.includes('## 📊 Test Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            }
