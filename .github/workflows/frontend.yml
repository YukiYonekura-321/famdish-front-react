name: Frontend CI

on:
  # main/develop へのマージは常にトリガー（production deploy のため）
  push:
    branches: [main, develop]
  # PR はソース変更時のみ lint / test / preview deploy を実行
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"
      - "jest.config.js"
      - "jest.setup.js"
      - "babel.config.js"
      - "eslint.config.mjs"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────
# Jobs
# ──────────────────────────────────────
jobs:
  # ── 1. Lint ─────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Unit & Integration Tests ─────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit & integration tests
        run: npx jest --verbose --coverage --ci

      # Node 22 のみカバレッジをアップロード
      - name: Upload coverage artifact
        if: always() && matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 3. Build ────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

  # ── 4. PR カバレッジコメント ─────────
  coverage-comment:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Comment PR with coverage
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## 📊 Test Coverage Report\n\n';

            try {
              const summary = JSON.parse(
                fs.readFileSync('./coverage/coverage-summary.json', 'utf8')
              );
              const t = summary.total;

              comment += '| Metric     | Coverage |\n';
              comment += '|------------|----------|\n';
              comment += `| Lines      | ${t.lines.pct.toFixed(2)}% |\n`;
              comment += `| Statements | ${t.statements.pct.toFixed(2)}% |\n`;
              comment += `| Branches   | ${t.branches.pct.toFixed(2)}% |\n`;
              comment += `| Functions  | ${t.functions.pct.toFixed(2)}% |\n`;
            } catch (e) {
              comment += '⚠️ カバレッジレポートの読み込みに失敗しました。\n';
            }

            comment += '\n_Generated by Frontend CI_';

            // 既存コメントがあれば更新、なければ新規作成
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c =>
              c.body?.includes('## 📊 Test Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            }

  # ── 5. Preview Deploy (PR) ──────────
  preview-deploy:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$URL" >> $GITHUB_OUTPUT

      - name: Comment PR with Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview-url }}';
            let comment = '## 🚀 Preview Deploy\n\n';
            comment += '| Status | URL |\n';
            comment += '|--------|-----|\n';
            comment += `| ✅ Ready | [${url}](${url}) |\n`;
            comment += '\n_Generated by Frontend CI_';

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c =>
              c.body?.includes('## 🚀 Preview Deploy')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            }

  # ── 6. Production Deploy (main) ─────
  production-deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      production-url: ${{ steps.deploy.outputs.production-url }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.production-url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production-url=$URL" >> $GITHUB_OUTPUT

  # ── 7. E2E Tests (Playwright) ───────
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    timeout-minutes: 20
    env:
      FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      E2E_BASE_URL: http://localhost:3000
      E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL }}
      # E2E ビルドは Firebase Emulator を使うため NEXT_PUBLIC は本番キー不要
      # ただし next build 時に undefined だと initializeApp が壊れるためダミー値を設定
      NEXT_PUBLIC_FIREBASE_API_KEY: e2e-test-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
      NEXT_PUBLIC_API_URL: http://localhost:3001
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@latest

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build Next.js application
        run: npm run build

      - name: Start Next.js application in background
        run: |
          npm run start > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          sleep 3

      - name: Run E2E tests (smoke against localhost)
        run: npx playwright test --project=smoke

      - name: Run E2E tests (auth + CRUD + AI against localhost)
        run: npx playwright test --project=chromium --project=mobile-safari

      - name: Cleanup server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            e2e-report/
            e2e-results/
            /tmp/server.log
          retention-days: 14

      - name: Comment PR with E2E results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## 🎭 E2E Test Results\n\n';

            try {
              const results = JSON.parse(
                fs.readFileSync('./e2e-results/.last-run.json', 'utf8')
              );
              const status = results.status === 'passed' ? '✅ Passed' : '❌ Failed';
              comment += `| Status | Result |\n`;
              comment += `|--------|--------|\n`;
              comment += `| E2E    | ${status} |\n`;
            } catch {
              comment += '⚠️ E2E テスト結果の読み込みに失敗しました。\n';
              comment += 'Artifacts からレポートを確認してください。\n';
            }

            comment += '\n_Generated by Frontend CI (Playwright)_';

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c =>
              c.body?.includes('## 🎭 E2E Test Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            }

  # ── 8. Post-Deploy Smoke (Production) ──
  production-smoke:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: [production-deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against production
        env:
          E2E_BASE_URL: ${{ needs.production-deploy.outputs.production-url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npx playwright test --project=smoke
